<!DOCTYPE html>

<head>

<style>

    /* Nav Links */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 25px;
    background: linear-gradient(145deg, gold, rgb(239, 238, 238));
    color: black;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* Glow Hover */
.nav-links a:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(198, 147, 35, 0.6);
}

/* Shine Effect */
.nav-links a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgb(255, 255, 255), transparent);
    transition: 0.5s;
}

.nav-links a:hover::before {
    left: 100%;
}

.feedback {
    background: #000;
    color: #d4af37;
    text-align: center;
    padding: 50px 20px;
}

.feedback h2 {
    margin-bottom: 20px;
    font-size: 28px;
}

.feedback form {
    max-width: 400px;
    margin: auto;
}

.feedback input,
.feedback textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #d4af37;
    background: transparent;
    color: #fff;
    border-radius: 8px;
}

.feedback input::placeholder,
.feedback textarea::placeholder {
    color: #aaa;
}

.feedback button {
    background: linear-gradient(145deg, #d4af37, #b8962e);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

.feedback button:hover {
    background: gold;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #111;
    border-top: 2px solid #d4af37;
}

/* WhatsApp */
.whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: #fff;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}


</style>
</head>
