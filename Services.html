/* BODY */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;

}

/* Nav Links */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 25px;
    background: linear-gradient(145deg, gold, rgb(237, 235, 235));
    color: black;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* Glow Hover */
.nav-links a:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(198, 147, 35, 0.6);
}

/* Shine Effect */
.nav-links a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgb(255, 255, 255), transparent);
    transition: 0.5s;
}

.nav-links a:hover::before {
    left: 100%;
}


/* HERO */
.hero {

}

}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    background: #d4af37;
    color: #000;
    padding: 12px 25px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #f5d27a;
    transform: scale(1.05);
}


/* CARDS */
.section {
    padding: 50px 20px;
    text-align: center;
}

.card-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #111;
    border: 1px solid #d4af37;
    margin: 15px;
    padding: 20px;
    width: 280px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #d4af37;
}


/* FOOTER */

    padding: 20px;
    background: #111;

/* WhatsApp */

    color: #fff;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}

</style>
